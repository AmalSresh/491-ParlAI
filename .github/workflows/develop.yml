name: Dev CI

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main
      - CICD-test-amal

jobs:
  frontend-validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format Check
        run: npm run format

      - name: Test
        run: npm run test

  backend-validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: ./backend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format
        run: npm run format

  e2e-tests:
    # Only run this job if the frontend and backend validation jobs pass
    needs: [frontend-validate, backend-validate]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: "npm"
          # Uses the root package-lock.json since E2E runs at the root
          cache-dependency-path: ./package-lock.json

      - name: Install Azure Functions Core Tools & SWA CLI
        # GitHub Actions runners don't have these installed by default!
        run: |
          npm i -g azure-functions-core-tools@4 --unsafe-perm true
          npm i -g @azure/static-web-apps-cli

      - name: Install Dependencies
        # This will install root dependencies AND frontend/backend via workspaces
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run E2E Tests
        # Runs the concurrent script we built to start the backend, frontend, swa, and tests
        run: npm run test:e2e:full

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        # always() ensures we get the report even if the tests fail
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
